<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>AgriSmart - Sign In</title><link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--green:#2d7a3a;--mid:#3d9e4e;--bright:#52c462;--dark:#1a2e1c;--ink:#2c4a2e;--muted:#6b8f6e;--off:#f7faf4;--light:#eef5e8;--pale:#ddecd4;--white:#fff;--rust:#c44a28}body{font-family:"DM Sans",sans-serif;background:var(--off);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(82,196,98,.12),transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(45,122,58,.08),transparent 50%);pointer-events:none}.card{background:var(--white);border-radius:24px;padding:48px;width:100%;max-width:440px;box-shadow:0 20px 80px rgba(45,122,58,.15);position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--bright),var(--green))}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px}.lm{width:40px;height:40px;background:linear-gradient(135deg,var(--green),var(--bright));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(45,122,58,.3)}.lt{font-family:Fraunces,serif;font-size:22px;font-weight:700;color:var(--dark)}.lt em{color:var(--green);font-style:normal}.title{font-family:Fraunces,serif;font-size:26px;font-weight:700;color:var(--dark);margin-bottom:4px}.sub{font-size:14px;color:var(--muted);margin-bottom:28px}.sub a{color:var(--green);font-weight:600;text-decoration:none}.label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}.inp{width:100%;background:var(--off);border:1.5px solid var(--pale);border-radius:10px;padding:13px 14px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--dark);outline:none;transition:.2s;margin-bottom:18px}.inp:focus{border-color:var(--green);background:var(--white);box-shadow:0 0 0 3px rgba(45,122,58,.08)}.inp::placeholder{color:#a8c4a8}.pw{display:flex;margin-bottom:18px}.pp{background:var(--light);border:1.5px solid var(--pale);border-right:none;border-radius:10px 0 0 10px;padding:13px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap}.pw .inp{border-radius:0 10px 10px 0;margin-bottom:0}.info{background:var(--light);border:1px solid var(--pale);border-radius:10px;padding:14px;margin-bottom:20px;font-size:13px;color:var(--muted);line-height:1.6}.info strong{color:var(--green)}.btn{width:100%;background:var(--green);border:none;border-radius:12px;padding:15px;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:.2s;box-shadow:0 4px 20px rgba(45,122,58,.3);margin-top:4px}.btn:hover{background:var(--mid);transform:translateY(-2px);box-shadow:0 8px 32px rgba(45,122,58,.4)}.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#a8c4a8;font-size:12px}.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--pale)}.btn2{width:100%;background:var(--white);border:2px solid var(--pale);border-radius:12px;padding:14px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;color:var(--green);cursor:pointer;transition:.2s;text-decoration:none;display:block;text-align:center}.btn2:hover{border-color:var(--bright);background:var(--light)}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.shake{animation:shake .3s ease}@media(max-width:480px){.card{padding:28px 20px}}</style></head><body><div class="card"><a class="logo" href="/"><div class="lm">&#127806;</div><div class="lt">Agri<em>Smart</em></div></a><div class="title">Welcome Back &#128075;</div><div class="sub">No account? <a href="/register">Register free &#8594;</a></div><div class="info">Sign in with your <strong>registered mobile</strong> and <strong>name</strong>. No password needed!</div><label class="label">Mobile Number</label><div class="pw"><div class="pp">&#127470;&#127475; +91</div><input class="inp" id="ph" type="tel" placeholder="98765 43210" maxlength="10"/></div><label class="label">Full Name</label><input class="inp" id="nm" type="text" placeholder="Enter your registered name"/><button class="btn" onclick="signIn()">Sign In to Dashboard &#8594;</button><div class="divider">new here?</div><a class="btn2" href="/register">&#127807; Create Free Account</a></div><script>async function signIn(){const ph=document.getElementById("ph").value.trim();const nm=document.getElementById("nm").value.trim();if(!ph||ph.length<10){shake("ph");return}if(!nm){shake("nm");return}const stored=sessionStorage.getItem("agri_farmer");if(stored){const f=JSON.parse(stored);if(f.phone==="+91"+ph){window.location.href="/dashboard";return}}const payload={name:nm,phone:"+91"+ph,location:"India",state:"Andhra Pradesh",city:"Vijayawada",city_sub:"Krishna District",city_lands:"2.8M acres",city_market:"Largest vegetable market in AP",land_size:"Not specified",crops:"Not specified"};sessionStorage.setItem("agri_farmer",JSON.stringify(payload));window.location.href="/dashboard"}function shake(id){const el=document.getElementById(id);el.classList.add("shake");el.addEventListener("animationend",()=>el.classList.remove("shake"),{once:true})}document.addEventListener("keydown",e=>{if(e.key==="Enter")signIn()})</script></body></html>
